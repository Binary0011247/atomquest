services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: atomquest_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Atomquest2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Overrides from .env for Docker (frontend served on port 80)
      FRONTEND_URL: http://localhost
      GOOGLE_REDIRECT_URI: http://localhost/auth/callback
      CORS_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
